<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Selector Config</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; max-width: 500px; margin: auto; }
        .box { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #8a5aE9; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #8a5aE9; color: white; font-weight: bold; cursor: pointer; }
        .url-row { display: flex; gap: 5px; }
        .btn-del { background: #ff4444; width: 40px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎬 Smart Selector</h2>
        <label>Addon URLs (Torrentio, etc):</label>
        <div id="urlContainer">
            <div class="url-row"><input type="url" class="addon-url" placeholder="https://..." required></div>
        </div>
        <button type="button" onclick="addInput()" style="background:#444">+ Añadir otro</button>

        <label>Audio:</label>
        <select id="audioLang"><option value="spa">Español</option><option value="eng">Inglés</option></select>
        
        <label>Calidad:</label>
        <select id="quality"><option value="1080p">1080p</option><option value="2160p">4K</option><option value="720p">720p</option></select>

        <button onclick="install()">INSTALAR ADDON</button>
    </div>

    <script>
        function addInput() {
            const div = document.createElement('div');
            div.className = 'url-row';
            div.innerHTML = '<input type="url" class="addon-url" required><button class="btn-del" onclick="this.parentElement.remove()">X</button>';
            document.getElementById('urlContainer').appendChild(div);
        }

        function install() {
            const urls = Array.from(document.querySelectorAll('.addon-url')).map(i => i.value).filter(v => v);
            const config = {
                addonUrls: urls.join(','),
                audioLang: document.getElementById('audioLang').value,
                quality: document.getElementById('quality').value,
                subtitleLang: 'none',
                minSeeders: 5
            };

            // Codificación segura para URLs (Base64 URL Safe)
            const str = JSON.stringify(config);
            const base64 = btoa(unescape(encodeURIComponent(str)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');

            const installUrl = `stremio://${window.location.host}/${base64}/manifest.json`;
            window.location.href = installUrl;
        }
    </script>
</body>
</html>
