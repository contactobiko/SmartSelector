<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Selector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #bb86fc; text-align: center; margin: 20px 0 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 25px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .card-title { color: #bb86fc; margin-bottom: 12px; font-size: 0.95em; }
        label { display: block; margin: 8px 0 4px; font-size: 0.85em; color: #aaa; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #bb86fc; }
        .url-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .url-row input { flex: 1; }
        .btn-add { background: #333; color: #bb86fc; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-add:hover { background: #444; }
        .btn-remove { background: #333; color: #fff; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-remove:hover { background: #c00; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; background: #2a2a2a; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
        .checkbox-item input { accent-color: #bb86fc; }
        .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .lang-row select { flex: 1; }
        .lang-row .arrow { color: #bb86fc; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-install { background: linear-gradient(135deg, #bb86fc, #6200ea); color: #fff; }
        .btn-copy { background: #333; color: #fff; }
        .btn-copy:hover { background: #444; }
        .btn-copy.copied { background: #2e7d32; }
        .result { margin-top: 15px; padding: 12px; background: #1a1a1a; border-radius: 6px; display: none; font-size: 12px; }
        .result a { color: #bb86fc; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Selector</h1>
        <p class="subtitle">Configurar addon</p>

        <div class="card">
            <div class="card-title">URLs de Addons</div>
            <div id="urlList">
                <div class="url-row">
                    <input type="text" class="addon-url" placeholder="">
                    <button class="btn-remove" onclick="removeUrl(this)">×</button>
                </div>
            </div>
            <button class="btn-add" onclick="addUrl()">+ Añadir</button>
        </div>

        <div class="card">
            <div class="card-title">Orden de Audio</div>
            <div id="audioList">
                <div class="lang-row">
                    <select class="audio-lang">
                        <option value="spa">Español</option>
                        <option value="eng">Inglés</option>
                        <option value="fra">Francés</option>
                        <option value="deu">Alemán</option>
                        <option value="ita">Italiano</option>
                        <option value="por">Portugués</option>
                        <option value="jpn">Japonés</option>
                        <option value="kor">Coreano</option>
                    </select>
                    <button class="btn-remove" onclick="removeAudio(this)">×</button>
                </div>
            </div>
            <button class="btn-add" onclick="addAudio()">+ Añadir</button>
        </div>

        <div class="card">
            <div class="card-title">Subtítulos por Audio</div>
            <div id="subtitleList">
                <div class="lang-row">
                    <select class="audio-source">
                        <option value="spa">Español</option>
                        <option value="eng">Inglés</option>
                        <option value="fra">Francés</option>
                        <option value="deu">Alemán</option>
                    </select>
                    <span class="arrow">→</span>
                    <select class="subtitle-target">
                        <option value="none">Sin subtítulos</option>
                        <option value="spa">Español</option>
                        <option value="eng">Inglés</option>
                        <option value="fra">Francés</option>
                    </select>
                    <button class="btn-remove" onclick="removeSubtitle(this)">×</button>
                </div>
            </div>
            <button class="btn-add" onclick="addSubtitle()">+ Añadir</button>
        </div>

        <div class="card">
            <div class="card-title">Calidades</div>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" value="2160p" checked> 4K</label>
                <label class="checkbox-item"><input type="checkbox" value="1080p" checked> 1080p</label>
                <label class="checkbox-item"><input type="checkbox" value="720p" checked> 720p</label>
                <label class="checkbox-item"><input type="checkbox" value="cam" checked> CAM</label>
                <label class="checkbox-item"><input type="checkbox" value="480p" checked> 480p</label>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-install" onclick="install()">Instalar</button>
            <button class="btn btn-copy" onclick="copyUrl()">Copiar URL</button>
        </div>

        <div class="result" id="result">
            URL del manifest:<br>
            <a id="manifestUrl" href="#"></a>
        </div>
    </div>

    <script>
        function addUrl() {
            const div = document.createElement('div');
            div.className = 'url-row';
            div.innerHTML = '<input type="text" class="addon-url" placeholder=""><button class="btn-remove" onclick="removeUrl(this)">×</button>';
            document.getElementById('urlList').appendChild(div);
        }
        function removeUrl(btn) {
            if (document.querySelectorAll('.url-row').length > 1) btn.parentElement.remove();
        }

        function addAudio() {
            const div = document.createElement('div');
            div.className = 'lang-row';
            div.innerHTML = `<select class="audio-lang"><option value="eng">Inglés</option><option value="spa">Español</option><option value="fra">Francés</option><option value="deu">Alemán</option><option value="ita">Italiano</option><option value="por">Portugués</option><option value="jpn">Japonés</option><option value="kor">Coreano</option></select><button class="btn-remove" onclick="removeAudio(this)">×</button>`;
            document.getElementById('audioList').appendChild(div);
        }
        function removeAudio(btn) {
            if (document.querySelectorAll('#audioList .lang-row').length > 1) btn.parentElement.remove();
        }

        function addSubtitle() {
            const div = document.createElement('div');
            div.className = 'lang-row';
            div.innerHTML = `<select class="audio-source"><option value="eng">Inglés</option><option value="spa">Español</option><option value="fra">Francés</option><option value="deu">Alemán</option></select><span class="arrow">→</span><select class="subtitle-target"><option value="none">Sin subtítulos</option><option value="spa">Español</option><option value="eng">Inglés</option><option value="fra">Francés</option></select><button class="btn-remove" onclick="removeSubtitle(this)">×</button>`;
            document.getElementById('subtitleList').appendChild(div);
        }
        function removeSubtitle(btn) {
            if (document.querySelectorAll('#subtitleList .lang-row').length > 1) btn.parentElement.remove();
        }

        function buildConfig() {
            const urls = [...document.querySelectorAll('.addon-url')].map(i => i.value.trim()).filter(Boolean);
            const audio = [...document.querySelectorAll('.audio-lang')].map(s => s.value);
            const subMap = {};
            document.querySelectorAll('#subtitleList .lang-row').forEach(row => {
                subMap[row.querySelector('.audio-source').value] = row.querySelector('.subtitle-target').value;
            });
            const qualities = [...document.querySelectorAll('.checkbox-item input:checked')].map(i => i.value);
            return { addonUrls: urls, audioPrefs: audio, subtitleMap: subMap, qualities };
        }

        function getManifestUrl(config) {
            const encoded = btoa(JSON.stringify(config));
            const { protocol, host } = window.location;
            return `${protocol}//${host}/${encoded}/manifest.json`;
        }

        function showResult(url) {
            document.getElementById('manifestUrl').href = url;
            document.getElementById('manifestUrl').textContent = url;
            document.getElementById('result').style.display = 'block';
        }

        function install() {
            const config = buildConfig();
            const url = getManifestUrl(config);
            showResult(url);
            window.location.href = `stremio://${window.location.host}/${btoa(JSON.stringify(config))}/manifest.json`;
        }

        function copyUrl() {
            const url = getManifestUrl(buildConfig());
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.textContent = 'Copiado';
                btn.classList.add('copied');
                showResult(url);
                setTimeout(() => {
                    btn.textContent = 'Copiar URL';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
